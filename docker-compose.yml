services:
  chatbot:
    build:
      context: .
      dockerfile: dockerfile_chatbot
    image: chatbot:1.0
    container_name: project_chatbot
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./dataset:/app/dataset:ro
      - ./models:/app/models:ro
      - ./.env:/app/.env:ro
